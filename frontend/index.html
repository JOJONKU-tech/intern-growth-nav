<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>实习生成长导航</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-hero">
    <h1>业务部实习生成长导航</h1>
    <p>标准化带教 · 成长可视化 · 协同高效</p>
  </div>
  <div class="login-cards" id="loginCards"></div>
</div>

<!-- PICKER -->
<div id="pickerPage" class="picker-page hidden">
  <h2 id="pickerTitle"></h2>
  <p class="picker-sub">选择身份进入系统</p>
  <div class="picker-list" id="pickerList"></div>
  <button class="picker-back" onclick="backToLogin()">返回首页</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <nav class="nav">
    <span class="nav-brand">实习生成长导航</span>
    <div class="nav-right">
      <span class="nav-role" id="navRole"></span>
      <span class="nav-name" id="navName"></span>
      <button class="nav-logout" onclick="logout()">退出</button>
    </div>
  </nav>
  <div class="container">

    <!-- INTERN VIEW -->
    <div id="viewIntern" class="hidden">
      <div class="page-header">
        <h2 id="iName"></h2>
        <div class="meta"><span id="iDept"></span><span style="margin:0 8px;color:var(--border-light);">|</span><span id="iPos"></span></div>
      </div>
      <div class="timeline" id="timeline"></div>
      <div class="progress-wrap">
        <span class="label">总体进度</span>
        <div class="track"><div class="fill" id="internBar"></div></div>
        <span class="stat" id="internStat"></span>
      </div>
      <div id="stageBlocks"></div>
    </div>

    <!-- MENTOR VIEW -->
    <div id="viewMentor" class="hidden">
      <div id="mentorList">
        <div class="section-title">我的实习生</div>
        <div class="filter-bar" id="filterBar"></div>
        <div class="mentor-cards" id="mentorCards"></div>
      </div>
      <div id="mentorDetail" class="hidden"></div>
    </div>

    <!-- HR VIEW -->
    <div id="viewHR" class="hidden">
      <div class="section-title">适岗总览</div>
      <div class="kpi-row" id="kpiRow"></div>
      <div class="chart-row">
        <div class="chart-card"><h4>岗位分布</h4><canvas id="chartDept"></canvas></div>
        <div class="chart-card"><h4>阶段分布</h4><canvas id="chartStage"></canvas></div>
      </div>
      <div class="table-wrap">
        <h4>实习生列表</h4>
        <div style="overflow-x:auto;">
          <table><thead><tr><th>姓名</th><th>岗位</th><th>部门</th><th>阶段</th><th>进度</th><th>入职</th></tr></thead>
          <tbody id="hrTableBody"></tbody></table>
        </div>
      </div>
      <div id="hrDetail" class="hidden" style="margin-top:24px;"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <textarea id="modalFB" placeholder="输入反馈（选填）"></textarea>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmComplete()">确认完成</button>
    </div>
  </div>
</div>

<!-- SVG icon defs -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></symbol>
  <symbol id="icon-briefcase" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></symbol>
  <symbol id="icon-chart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 3 4-8"/></symbol>
  <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 12 9 17 20 6"/></symbol>
</svg>

<script>
let currentUser=null,pendingRole=null,pendingPlanId=null,pendingInternId=null;
let allAccounts=[],hrData=null,hrCharts={};

async function init(){
  const res=await fetch('/api/auth/accounts');
  allAccounts=await res.json();
  renderLogin();
}

function renderLogin(){
  document.getElementById('loginCards').innerHTML=[
    {role:'intern',title:'实习生',desc:'查看个人成长路径与阶段目标',icon:'user',cls:'intern'},
    {role:'mentor',title:'导师',desc:'管理带教计划与实习生进度',icon:'briefcase',cls:'mentor'},
    {role:'hr',title:'HR',desc:'全局适岗总览与异常预警',icon:'chart',cls:'hr'}
  ].map(r=>`
    <div class="role-card" onclick="openPicker('${r.role}')">
      <div class="role-icon ${r.cls}"><svg><use href="#icon-${r.icon}"/></svg></div>
      <div class="role-title">${r.title}</div>
      <div class="role-desc">${r.desc}</div>
    </div>
  `).join('');
}

function openPicker(role){
  pendingRole=role;
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('pickerPage').classList.remove('hidden');
  const labels={intern:'实习生',mentor:'导师',hr:'HR'};
  document.getElementById('pickerTitle').textContent='我是'+labels[role];
  const accounts=allAccounts.filter(a=>a.role===role);
  const depNames={2:'研发',3:'产品',4:'销售'};
  document.getElementById('pickerList').innerHTML=accounts.map(a=>`
    <button class="pick-btn" onclick="login(${a.id})">
      <span class="pick-avatar">${a.name[0]}</span>
      ${a.name}${a.role==='mentor'?' · '+depNames[a.id]:''}${a.role==='intern'?' · '+depNames[a.mentor_id||'']+'部':''}
    </button>
  `).join('');
}

function backToLogin(){
  document.getElementById('pickerPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

async function login(id){
  const res=await fetch('/api/auth/login/'+id);
  currentUser=await res.json();
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('pickerPage').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('navName').textContent=currentUser.name;
  const rl={hr:'HR',mentor:'导师',intern:'实习生'};
  document.getElementById('navRole').textContent=rl[currentUser.role];

  ['viewIntern','viewMentor','viewHR'].forEach(v=>document.getElementById(v).classList.add('hidden'));
  if(currentUser.role==='intern')await loadIntern();
  else if(currentUser.role==='mentor')await loadMentor();
  else await loadHR();
}

function logout(){
  currentUser=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

// ========== INTERN ==========
async function loadIntern(){
  document.getElementById('viewIntern').classList.remove('hidden');
  const res=await fetch('/api/intern/'+currentUser.id);
  const d=await res.json();
  if(d.error)return;
  document.getElementById('iName').textContent=d.intern.name;
  document.getElementById('iDept').textContent=d.intern.department+'部';
  document.getElementById('iPos').textContent=d.intern.position;

  // Timeline
  const keys=['onboarding','growth','independent'];
  const names=['入职适应','快速成长','独立贡献'];
  const ci=keys.indexOf(d.intern.stage);
  document.getElementById('timeline').innerHTML=names.map((n,i)=>{
    let c='';if(i<ci)c='done';else if(i===ci)c='active';
    return `<div class="timeline-step ${c}"><div class="dot">${i<ci?'\u2713':i+1}</div><div class="t-label">${n}</div></div>`;
  }).join('');

  // Progress
  document.getElementById('internBar').style.width=d.progress_pct+'%';
  document.getElementById('internStat').textContent=d.completed_milestones+'/'+d.total_milestones+' ('+d.progress_pct+'%)';

  // Stage blocks
  document.getElementById('stageBlocks').innerHTML=d.stages.map((s,i)=>{
    const sk=keys[i];const allDone=s.items.every(it=>it.status==='completed');
    let badge='';let tagCls='tag-gray';
    if(allDone){badge='已完成';tagCls='tag-green';}
    else if(s.items.some(it=>it.status==='completed')){badge='进行中';tagCls='tag-blue';}
    else{badge='待开始';tagCls='tag-gray';}
    return `<div class="stage-block">
      <h3>${names[i]}<span class="tag ${tagCls}">${badge}</span></h3>
      ${s.items.map(it=>`
        <div class="stage-item">
          <div class="si-dot ${it.status}">${it.status==='completed'?'\u2713':''}</div>
          <div class="si-info">
            <div class="si-name">${it.name}</div>
            <div class="si-desc">${it.description}</div>
            ${it.feedback?`<div class="si-feedback">导师反馈：${it.feedback}</div>`:''}
          </div>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

// ========== MENTOR ==========
async function loadMentor(){
  document.getElementById('viewMentor').classList.remove('hidden');
  document.getElementById('mentorList').classList.remove('hidden');
  document.getElementById('mentorDetail').classList.add('hidden');
  const res=await fetch('/api/mentor/'+currentUser.id+'/interns');
  const interns=await res.json();
  window._mi=interns;

  document.getElementById('filterBar').innerHTML=[
    ['all','全部'],['onboarding','入职适应'],['growth','快速成长'],['independent','独立贡献']
  ].map(([k,v],i)=>`<button class="filter-btn${i===0?' active':''}" onclick="filterI('${k}',this)">${v}</button>`).join('');

  renderCards(interns);
}

function filterI(stage,btn){
  document.querySelectorAll('#filterBar .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(stage==='all'?window._mi:window._mi.filter(i=>i.stage===stage));
}

const sn={onboarding:'入职适应',growth:'快速成长',independent:'独立贡献'};
function renderCards(interns){
  document.getElementById('mentorCards').innerHTML=interns.length?interns.map(i=>`
    <div class="mentor-card" onclick="openDetail(${i.id})">
      <div class="mc-top">
        <span class="mc-name">${i.name}</span>
        <span class="tag tag-blue">${sn[i.stage]||i.stage}</span>
      </div>
      <div class="mc-pos">${i.department}部 · ${i.position}</div>
      <div class="mc-bar">
        <div class="track"><div class="fill" style="width:${i.progress_pct}%"></div></div>
        <span class="stat">${i.completed}/${i.total}</span>
      </div>
    </div>
  `).join(''):'<div class="empty">暂无该阶段的实习生</div>';
}

async function openDetail(iid){
  document.getElementById('mentorList').classList.add('hidden');
  document.getElementById('mentorDetail').classList.remove('hidden');
  currentMentorInternId=iid;
  const res=await fetch('/api/mentor/'+currentUser.id+'/intern/'+iid+'/plan');
  const d=await res.json();
  let cs='';

  document.getElementById('mentorDetail').innerHTML=`
    <button class="detail-back" onclick="loadMentor()">返回列表</button>
    <div class="detail-panel">
      <div class="dp-title">${d.intern_name} 的带教计划</div>
      <div class="dp-meta">${d.department}部</div>
      ${d.items.map(it=>{
        let h='';if(it.stage!==cs){cs=it.stage;h=`<div class="stage-divider">${sn[it.stage]||it.stage}</div>`;}
        return h+`<div class="plan-item">
          <div class="plan-check${it.status==='completed'?' done':''}" onclick="${it.status==='completed'?'':`openModal(${it.plan_id},${iid},'${it.milestone}')`}"></div>
          <div class="plan-info"><h5>${it.milestone}</h5><span>${it.description}</span></div>
          ${it.feedback?`<span class="plan-fb">${it.feedback}</span>`:''}
        </div>`;
      }).join('')}
    </div>`;
}

// ========== MODAL ==========
function openModal(pid,iid,name){
  pendingPlanId=pid;pendingInternId=iid;
  document.getElementById('modalTitle').textContent='完成确认：'+name;
  document.getElementById('modalFB').value='';
  document.getElementById('modal').classList.add('active');
}
function closeModal(){document.getElementById('modal').classList.remove('active');}
async function confirmComplete(){
  const fb=document.getElementById('modalFB').value;
  await fetch('/api/mentor/'+currentUser.id+'/complete/'+pendingPlanId,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({intern_id:pendingInternId,feedback:fb})
  });
  closeModal();
  openDetail(pendingInternId);
}

// ========== HR ==========
async function loadHR(){
  document.getElementById('viewHR').classList.remove('hidden');
  const res=await fetch('/api/hr/dashboard');
  hrData=await res.json();

  const dc=hrData.dept_counts,sc=hrData.stage_counts;
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">实习生总数</div><div class="kpi-value">${hrData.total}</div><div class="kpi-sub">研发${dc.find(x=>x.department==='研发')?.count||0} · 产品${dc.find(x=>x.department==='产品')?.count||0} · 销售${dc.find(x=>x.department==='销售')?.count||0}</div></div>
    <div class="kpi-card"><div class="kpi-label">整体完成率</div><div class="kpi-value">${hrData.completion_rate}%</div><div class="kpi-sub ${hrData.completion_rate>50?'good':'warn'}">带教计划执行进度</div></div>
    <div class="kpi-card"><div class="kpi-label">入职适应中</div><div class="kpi-value">${sc.find(s=>s.stage==='入职适应')?.count||0}</div><div class="kpi-sub warn">需重点跟进</div></div>
    <div class="kpi-card"><div class="kpi-label">异常预警</div><div class="kpi-value" style="color:${hrData.anomaly_count?'var(--color-danger)':'var(--color-success)'}">${hrData.anomaly_count}</div><div class="kpi-sub ${hrData.anomaly_count?'danger':'good'}">入职超60天未转阶段</div></div>
  `;

  renderCharts();

  document.getElementById('hrTableBody').innerHTML=hrData.interns.map(i=>`
    <tr class="${i.anomaly?'row-warn':''}" style="cursor:pointer" onclick="openHRDetail(${i.id})">
      <td style="font-weight:500">${i.name}</td><td>${i.position}</td><td>${i.department}</td>
      <td><span class="tag ${i.stage==='入职适应'?'tag-amber':i.stage==='独立贡献'?'tag-green':'tag-blue'}">${i.stage}</span></td>
      <td><div class="progress-mini"><div class="bar"><div class="fill" style="width:${i.progress_pct}%"></div></div><span class="pct">${i.progress_pct}%</span></div></td>
      <td style="color:var(--text-secondary)">${i.start_date}</td>
    </tr>
  `).join('');
}

function renderCharts(){
  if(hrCharts.dept)hrCharts.dept.destroy();
  if(hrCharts.stage)hrCharts.stage.destroy();
  hrCharts.dept=new Chart(document.getElementById('chartDept'),{
    type:'doughnut',
    data:{labels:hrData.dept_counts.map(d=>d.department),datasets:[{data:hrData.dept_counts.map(d=>d.count),backgroundColor:['#0052d9','#366ef4','#85b0f9'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}}}
  });
  hrCharts.stage=new Chart(document.getElementById('chartStage'),{
    type:'bar',
    data:{labels:hrData.stage_counts.map(s=>s.stage),datasets:[{label:'人数',data:hrData.stage_counts.map(s=>s.count),backgroundColor:['#e8f0fe','#0052d9','#00a870'],borderRadius:4,borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#f1f3f6'},beginAtZero:true,ticks:{stepSize:2}},x:{grid:{display:false}}}}
  });
}

async function openHRDetail(iid){
  const res=await fetch('/api/intern/'+iid);
  const d=await res.json();
  if(d.error)return;
  const keys=['onboarding','growth','independent'];
  const names=['入职适应','快速成长','独立贡献'];
  document.getElementById('hrDetail').classList.remove('hidden');
  document.getElementById('hrDetail').innerHTML=`
    <button class="detail-back" onclick="document.getElementById('hrDetail').classList.add('hidden')">返回列表</button>
    <div class="detail-panel">
      <div class="dp-title">${d.intern.name}</div>
      <div class="dp-meta">${d.intern.department}部 · ${d.intern.position} · 入职 ${d.intern.start_date} · ${names[keys.indexOf(d.intern.stage)]||d.intern.stage} · 完成率 ${d.progress_pct}%</div>
      <div class="progress-wrap" style="padding:12px 0;box-shadow:none">
        <div class="track"><div class="fill" style="width:${d.progress_pct}%"></div></div>
        <span class="stat">${d.completed_milestones}/${d.total_milestones}</span>
      </div>
      ${d.stages.map((s,i)=>`
        <div class="stage-divider" style="font-weight:600;color:var(--text-primary)">${names[i]}</div>
        ${s.items.map(it=>`
          <div class="stage-item">
            <div class="si-dot ${it.status}">${it.status==='completed'?'\u2713':''}</div>
            <div class="si-info">
              <div class="si-name">${it.name}</div>
              <div class="si-desc">${it.description}</div>
              ${it.feedback?`<div class="si-feedback">导师反馈：${it.feedback}</div>`:''}
            </div>
          </div>
        `).join('')}
      `).join('')}
    </div>`;
}

init();
</script>
</body>
</html>
