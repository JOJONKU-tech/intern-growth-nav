<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>实习生成长导航 · 启程</title>
<style>
  :root {
    --ink:        #1a0e1f;
    --paper:      #f5f0e8;
    --warm-1:     #fff3e0;
    --warm-2:     #ffd9a8;
    --warm-3:     #ff9a5a;
    --warm-4:     #d4561a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #150820;
    font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--warm-1);
  }
  canvas#scene {
    position: fixed; inset: 0; z-index: 1; display: block;
    opacity: 0;
    animation: sceneIn 1.6s ease 0.3s forwards;
  }
  @keyframes sceneIn { to { opacity: 1; } }

  /* Atmospheric overlays */
  .vignette {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: radial-gradient(ellipse 80% 60% at center, transparent 30%, rgba(20,8,30,0.75) 100%);
  }
  .grain {
    position: fixed; inset: 0; z-index: 6; pointer-events: none;
    opacity: 0.05;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.6) 1px, transparent 0);
    background-size: 3px 3px;
    mix-blend-mode: overlay;
  }
  .scan {
    position: fixed; inset: 0; z-index: 7; pointer-events: none;
    background: repeating-linear-gradient(180deg, transparent 0 3px, rgba(255,140,80,0.025) 3px 4px);
    opacity: 0.6;
  }

  /* Corner brackets */
  .corner {
    position: fixed; z-index: 8; width: 18px; height: 18px;
    border-color: var(--warm-3); opacity: 0;
    animation: fadeUp 1.4s ease 0.6s forwards;
  }
  .corner.tl { top: 24px; left: 24px;  border-top: 1px solid; border-left: 1px solid; }
  .corner.tr { top: 24px; right: 24px; border-top: 1px solid; border-right: 1px solid; }
  .corner.bl { bottom: 24px; left: 24px;  border-bottom: 1px solid; border-left: 1px solid; }
  .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid; border-right: 1px solid; }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 36px;
    color: var(--warm-2);
    pointer-events: none;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0; transform: translateY(-10px);
    animation: fadeDown 1.4s ease 0.4s forwards;
  }
  .topbar .left { display: flex; align-items: center; gap: 14px; }
  .topbar .mark { font-weight: 600; color: var(--warm-1); }
  .topbar .divider { width: 24px; height: 1px; background: var(--warm-3); opacity: 0.5; }
  .topbar .meta { opacity: 0.55; font-size: 10px; letter-spacing: 0.3em; }

  /* Stage */
  .stage {
    position: fixed; inset: 0; z-index: 15;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .title {
    font-size: 64px;
    font-weight: 200;
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    color: var(--warm-1);
    text-shadow: 0 0 60px rgba(255,140,80,0.55), 0 2px 0 rgba(0,0,0,0.3);
    margin-bottom: 14px;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 1.6s ease 0.5s forwards;
  }
  .subtitle {
    font-size: 11px;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    color: var(--warm-2);
    opacity: 0; transform: translateY(20px);
    margin-bottom: 64px;
    animation: fadeUp 1.6s ease 0.8s forwards;
  }
  .subtitle::before, .subtitle::after { content: '——'; margin: 0 16px; opacity: 0.6; }

  .btn-start {
    pointer-events: auto;
    background: linear-gradient(135deg, rgba(255,138,76,0.18), rgba(255,90,40,0.08));
    border: 1px solid rgba(255,180,120,0.55);
    color: var(--warm-1);
    font-family: inherit;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    padding: 20px 64px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 1.6s ease 1.2s forwards, breathing 3.2s ease-in-out 2.8s infinite;
    transition: background 0.4s, box-shadow 0.4s, letter-spacing 0.4s, border-color 0.4s;
    position: relative;
  }
  .btn-start:hover {
    background: linear-gradient(135deg, rgba(255,138,76,0.42), rgba(255,90,40,0.2));
    box-shadow: 0 0 60px rgba(255,120,60,0.45), inset 0 0 24px rgba(255,180,120,0.18);
    letter-spacing: 0.6em;
    border-color: rgba(255,220,180,0.8);
  }

  /* Bottom hint */
  .hint {
    position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
    z-index: 15; pointer-events: none;
    color: rgba(255,220,180,0.55);
    font-size: 10px;
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    opacity: 0; animation: fadeUp 1.4s ease 2s forwards;
  }
  .hint::before { content: '· '; }

  /* Loading state */
  .loading {
    position: fixed; inset: 0; z-index: 100;
    background: #150820;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.8s ease;
  }
  .loading.hide { opacity: 0; pointer-events: none; }
  .loading-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--warm-3);
    box-shadow: 0 0 14px var(--warm-3);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes fadeUp   { to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
  @keyframes breathing {
    0%, 100% { box-shadow: 0 0 30px rgba(255,120,60,0.2), inset 0 0 12px rgba(255,180,120,0.1); }
    50%      { box-shadow: 0 0 55px rgba(255,120,60,0.45), inset 0 0 22px rgba(255,180,120,0.2); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }

  /* White flash overlay */
  .flash {
    position: fixed; inset: 0; z-index: 50;
    background: white;
    opacity: 0; pointer-events: none;
  }

  /* End placeholder */
  .end {
    position: fixed; inset: 0; z-index: 40;
    background: linear-gradient(180deg, #f7f1e6 0%, #ead9bf 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
  }
  .end-mark {
    width: 48px; height: 1px; background: #8a5a30; margin-bottom: 32px; opacity: 0.4;
  }
  .end h1 {
    color: #1a0e1f;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
  }
  .end .end-sub {
    color: #6a4a30;
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    opacity: 0.6;
  }
  .end .end-tag {
    margin-top: 56px;
    color: #8a5a30;
    font-size: 10px;
    letter-spacing: 0.3em;
    opacity: 0.4;
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div class="vignette"></div>
<div class="grain"></div>
<div class="scan"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="topbar">
  <div class="left">
    <span class="mark">实习生成长导航</span>
    <span class="divider"></span>
    <span class="meta">INTERN GROWTH NAV</span>
  </div>
  <div class="meta">CHAPTER 00 · 启程</div>
</div>

<div class="stage" id="stage">
  <h1 class="title">启 程</h1>
  <div class="subtitle">A JOURNEY OF GROWTH</div>
  <button class="btn-start" id="btnStart" onclick="startJourney()">开始旅途</button>
</div>

<div class="hint">移动鼠标 · 体验视差</div>

<div class="flash" id="flash"></div>

<div class="end" id="endScreen">
  <div class="end-mark"></div>
  <h1>进入角色选择</h1>
  <p class="end-sub">CHARACTER SELECT · LOADING</p>
  <p class="end-tag">PROTOTYPE PLACEHOLDER</p>
</div>

<div class="loading" id="loading"><div class="loading-dot"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function () {
  'use strict';

  // Hide loading once everything is in
  window.onload = function () {
    setTimeout(function () {
      var ld = document.getElementById('loading');
      if (ld) ld.classList.add('hide');
    }, 250);
  };

  // ===================== Three.js =====================
  var canvas   = document.getElementById('scene');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0xff7a3a, 0.012);

  var camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2.2, 8);

  var lookTarget = new THREE.Vector3(0, 2.5, 0);
  camera.lookAt(lookTarget);

  // ===================== Sky dome =====================
  var skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: { sunPos: { value: new THREE.Vector3(0.0, 0.08, -1.0) } },
    vertexShader: [
      'varying vec3 vDir;',
      'void main() {',
      '  vDir = normalize(position);',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vDir;',
      'uniform vec3 sunPos;',
      'void main() {',
      '  float h = vDir.y;',
      '  vec3 zenith  = vec3(0.10, 0.07, 0.22);',
      '  vec3 horizon = vec3(0.83, 0.34, 0.10);',
      '  vec3 pink    = vec3(0.98, 0.62, 0.40);',
      '  vec3 nadir   = vec3(0.10, 0.05, 0.08);',
      '  vec3 col;',
      '  if (h > 0.0) {',
      '    col = mix(horizon, pink, smoothstep(0.0, 0.08, h));',
      '    col = mix(col, zenith, smoothstep(0.05, 0.7, h));',
      '  } else {',
      '    col = mix(horizon, nadir, smoothstep(0.0, -0.4, h));',
      '  }',
      '  float d = max(dot(vDir, normalize(sunPos)), 0.0);',
      '  col += vec3(1.0, 0.78, 0.45) * pow(d, 64.0) * 1.2;',
      '  col += vec3(1.0, 0.55, 0.20) * pow(d, 6.0)  * 0.18;',
      '  col += vec3(1.0, 0.45, 0.20) * pow(d, 2.0)  * 0.06;',
      '  col += sin(vDir.y * 30.0) * 0.005;',
      '  gl_FragColor = vec4(col, 1.0);',
      '}'
    ].join('\n')
  });
  var sky = new THREE.Mesh(new THREE.SphereGeometry(400, 32, 16), skyMat);
  scene.add(sky);

  // Sun disk
  var sun = new THREE.Mesh(
    new THREE.CircleGeometry(7, 32),
    new THREE.MeshBasicMaterial({ color: 0xfff2c0, fog: false })
  );
  sun.position.set(0, 6, -300);
  scene.add(sun);

  // Sun halo
  function makeRadialTex() {
    var c = document.createElement('canvas');
    c.width = c.height = 256;
    var ctx = c.getContext('2d');
    var g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
    g.addColorStop(0.00, 'rgba(255,255,240,1)');
    g.addColorStop(0.18, 'rgba(255,200,140,0.55)');
    g.addColorStop(0.50, 'rgba(255,120,60,0.18)');
    g.addColorStop(1.00, 'rgba(255,80,30,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 256, 256);
    return new THREE.CanvasTexture(c);
  }
  var halo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeRadialTex(),
    color: 0xffffff,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    fog: false
  }));
  halo.position.set(0, 6, -299);
  halo.scale.set(80, 80, 1);
  scene.add(halo);

  // ===================== Lighting =====================
  var keyLight  = new THREE.DirectionalLight(0xffb070, 1.5);
  keyLight.position.set(0, 8, -12);
  scene.add(keyLight);

  var rimLight  = new THREE.DirectionalLight(0xff5520, 1.0);
  rimLight.position.set(3, 4, -8);
  scene.add(rimLight);

  var fillLight = new THREE.DirectionalLight(0x6080a0, 0.35);
  fillLight.position.set(0, 2, 8);
  scene.add(fillLight);

  scene.add(new THREE.HemisphereLight(0xff9050, 0x1a0a18, 0.5));
  scene.add(new THREE.AmbientLight(0x332244, 0.35));

  // ===================== Parallax layers =====================
  var skyLayer       = new THREE.Group();
  var farLayer       = new THREE.Group();   // distant city
  var midLayer       = new THREE.Group();   // mid buildings
  var nearLayer      = new THREE.Group();   // near buildings + character
  var particleLayer  = new THREE.Group();
  scene.add(skyLayer, farLayer, midLayer, nearLayer, particleLayer);

  // ===================== Procedural buildings =====================
  function buildCity(group, count, zRange, hMin, hMax, wMin, wMax, color) {
    for (var i = 0; i < count; i++) {
      var w = wMin + Math.random() * (wMax - wMin);
      var h = hMin + Math.random() * (hMax - hMin);
      var d = 3 + Math.random() * 8;
      var mat = new THREE.MeshStandardMaterial({
        color: color, roughness: 0.95, metalness: 0.0
      });
      var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      m.position.set(
        (Math.random() - 0.5) * 260,
        h / 2,
        zRange[0] + Math.random() * (zRange[1] - zRange[0])
      );
      group.add(m);
      // Antenna
      if (Math.random() < 0.28) {
        var antH = 4 + Math.random() * 12;
        var antMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.95 });
        var ant = new THREE.Mesh(new THREE.BoxGeometry(0.25, antH, 0.25), antMat);
        ant.position.set(m.position.x, h + antH / 2, m.position.z);
        group.add(ant);
      }
      // Glowing windows
      if (Math.random() < 0.5) {
        for (var j = 0; j < 3; j++) {
          var win = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.3, 0.1),
            new THREE.MeshBasicMaterial({ color: 0xffcc88, fog: true })
          );
          win.position.set(
            m.position.x + (Math.random() - 0.5) * w * 0.7,
            2 + Math.random() * (h - 3),
            m.position.z + d / 2 + 0.05
          );
          group.add(win);
        }
      }
    }
  }
  // Far city: warm-tinted silhouette
  buildCity(farLayer,  75, [-220, -100], 25, 110, 6, 16, 0x1c0e0a);
  buildCity(midLayer,  40, [-95,  -30], 12, 55,  5, 12, 0x120808);
  buildCity(nearLayer, 20, [-22,   -3],  3, 14,  4, 10, 0x080404);

  // Street lamp posts in near layer (at sides)
  for (var k = 0; k < 6; k++) {
    var post = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, 5, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a0a0a, roughness: 0.9 })
    );
    post.position.set(-9 + k * 3.6, 2.5, -1.5);
    nearLayer.add(post);
    var lamp = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 10, 10),
      new THREE.MeshBasicMaterial({ color: 0xffd28a, fog: true })
    );
    lamp.position.set(-9 + k * 3.6, 5, -1.5);
    nearLayer.add(lamp);
  }

  // Ground
  var ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshStandardMaterial({ color: 0x0c0606, roughness: 1.0, metalness: 0.0 })
  );
  ground.rotation.x = -Math.PI / 2;
  nearLayer.add(ground);

  // ===================== Character =====================
  var character = new THREE.Group();
  character.position.set(0, 0, 2);
  nearLayer.add(character);

  var plugsuit = new THREE.MeshStandardMaterial({
    color: 0xc9351a, roughness: 0.45, metalness: 0.05,
    emissive: 0x4a0d05, emissiveIntensity: 0.4
  });
  var skin = new THREE.MeshStandardMaterial({
    color: 0xf2c8a0, roughness: 0.6, metalness: 0.0,
    emissive: 0x331a0a, emissiveIntensity: 0.2
  });
  var hair = new THREE.MeshStandardMaterial({
    color: 0xff7820, roughness: 0.5, metalness: 0.0,
    emissive: 0x3a1505, emissiveIntensity: 0.35
  });
  var tie  = new THREE.MeshStandardMaterial({ color: 0x1a0a08, roughness: 0.4 });

  // Torso (tapered cylinder)
  var torso = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.5, 1.8, 12), plugsuit);
  torso.position.y = 1.85;
  character.add(torso);

  // Shoulders
  var shoulders = new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.32, 0.55), plugsuit);
  shoulders.position.y = 2.7;
  character.add(shoulders);

  // Neck
  var neck = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.18, 0.2, 8), skin);
  neck.position.y = 2.9;
  character.add(neck);

  // Head
  var head = new THREE.Mesh(new THREE.SphereGeometry(0.42, 16, 16), skin);
  head.position.y = 3.35;
  head.scale.set(1, 1.1, 0.95);
  character.add(head);

  // Hair back
  var hairBack = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), hair);
  hairBack.position.set(0, 3.45, -0.05);
  hairBack.scale.set(1.08, 1.15, 1.1);
  character.add(hairBack);

  // Hair bangs
  var hairBangs = new THREE.Mesh(new THREE.SphereGeometry(0.46, 16, 16), hair);
  hairBangs.position.set(0, 3.55, 0.08);
  hairBangs.scale.set(1.08, 0.7, 1.05);
  character.add(hairBangs);

  // Bang strand
  var bang = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.35, 0.1), hair);
  bang.position.set(0.12, 3.55, 0.38);
  bang.rotation.z = 0.12;
  character.add(bang);

  // Eyes
  var eyeWhite = new THREE.MeshBasicMaterial({ color: 0xf6e8d6 });
  var iris     = new THREE.MeshBasicMaterial({ color: 0x3388cc });
  var pupil    = new THREE.MeshBasicMaterial({ color: 0x100a18 });
  function addEye(x) {
    var w = new THREE.Mesh(new THREE.SphereGeometry(0.075, 10, 10), eyeWhite);
    w.position.set(x, 3.4, 0.36);
    w.scale.set(1, 1.1, 0.6);
    character.add(w);
    var i = new THREE.Mesh(new THREE.SphereGeometry(0.05, 10, 10), iris);
    i.position.set(x, 3.4, 0.41);
    character.add(i);
    var p = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), pupil);
    p.position.set(x, 3.4, 0.435);
    character.add(p);
  }
  addEye(-0.13); addEye(0.13);

  // Twin tails
  var tailGeo = new THREE.ConeGeometry(0.18, 1.6, 8);
  var tailL = new THREE.Mesh(tailGeo, hair);
  tailL.position.set(-0.42, 2.6, -0.18);
  tailL.rotation.z = 0.3;
  tailL.rotation.x = 0.1;
  character.add(tailL);
  var tailR = new THREE.Mesh(tailGeo, hair);
  tailR.position.set(0.42, 2.6, -0.18);
  tailR.rotation.z = -0.3;
  tailR.rotation.x = 0.1;
  character.add(tailR);

  // Hair ties
  var tieL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.12, 8), tie);
  tieL.position.set(-0.32, 3.05, -0.05);
  tieL.rotation.z = Math.PI / 2;
  character.add(tieL);
  var tieR = tieL.clone();
  tieR.position.x = 0.32;
  character.add(tieR);

  // Arms (with pivots for animation)
  function makeArm(side) {
    var pivot = new THREE.Group();
    pivot.position.set(side * 0.78, 2.6, 0);

    var upperLen = 1.0;
    var upper = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.12, upperLen, 8), plugsuit);
    upper.position.set(0, -upperLen / 2, 0);
    pivot.add(upper);

    var forePivot = new THREE.Group();
    forePivot.position.set(0, -upperLen, 0);
    pivot.add(forePivot);

    var foreLen = 0.95;
    var forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, foreLen, 8), plugsuit);
    forearm.position.set(0, -foreLen / 2, 0);
    forePivot.add(forearm);

    // Palm
    var palm = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.32, 0.14), skin);
    palm.position.set(0, -foreLen - 0.12, 0);
    forePivot.add(palm);

    // Fingers
    for (var i = 0; i < 4; i++) {
      var f = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.16, 0.05), skin);
      f.position.set(-0.075 + i * 0.05, -foreLen - 0.32, 0.06);
      forePivot.add(f);
    }
    // Thumb
    var thumb = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.13, 0.06), skin);
    thumb.position.set(side * 0.13, -foreLen - 0.18, 0.04);
    thumb.rotation.z = side * 0.5;
    forePivot.add(thumb);

    return { pivot: pivot, forePivot: forePivot };
  }

  var leftArm  = makeArm(-1);
  var rightArm = makeArm(1);
  character.add(leftArm.pivot, rightArm.pivot);

  // Rest pose
  leftArm.pivot.rotation.set(0.1, 0, 0.25);
  leftArm.forePivot.rotation.set(0.2, 0, 0);
  rightArm.pivot.rotation.set(0.1, 0, -0.25);
  rightArm.forePivot.rotation.set(0.2, 0, 0);

  // ===================== Floating light particles =====================
  var pCount = 500;
  var pPos   = new Float32Array(pCount * 3);
  var pVel   = new Float32Array(pCount);
  for (var pi = 0; pi < pCount; pi++) {
    pPos[pi * 3]     = (Math.random() - 0.5) * 80;
    pPos[pi * 3 + 1] = 0.5 + Math.random() * 22;
    pPos[pi * 3 + 2] = (Math.random() - 0.5) * 60 - 5;
    pVel[pi]         = 0.002 + Math.random() * 0.006;
  }
  var pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  var pMat = new THREE.PointsMaterial({
    color: 0xffd9a0,
    size: 0.18,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
    fog: true
  });
  var particles = new THREE.Points(pGeo, pMat);
  particleLayer.add(particles);

  // Larger dust sprites
  var dustMat = new THREE.SpriteMaterial({
    map: makeRadialTex(),
    color: 0xffa060,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    opacity: 0.45,
    fog: true
  });
  for (var di = 0; di < 14; di++) {
    var s = new THREE.Sprite(dustMat);
    s.position.set(
      (Math.random() - 0.5) * 40,
      2 + Math.random() * 15,
      (Math.random() - 0.5) * 30
    );
    s.scale.set(2 + Math.random() * 3, 2 + Math.random() * 3, 1);
    particleLayer.add(s);
  }

  // ===================== Mouse parallax =====================
  var mouseX = 0, mouseY = 0;
  var smX = 0, smY = 0;
  var journeyActive = false;

  window.onmousemove = function (e) {
    mouseX = (e.clientX / window.innerWidth)  * 2 - 1;
    mouseY = (e.clientY / window.innerHeight) * 2 - 1;
  };
  window.ontouchmove = function (e) {
    if (e.touches && e.touches.length) {
      mouseX = (e.touches[0].clientX / window.innerWidth)  * 2 - 1;
      mouseY = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
    }
  };
  window.onresize = function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  };

  // ===================== Animate loop =====================
  var clock = new THREE.Clock();
  function tick() {
    var t = clock.getElapsedTime();
    smX += (mouseX - smX) * 0.05;
    smY += (mouseY - smY) * 0.05;

    if (!journeyActive) {
      // Camera subtle drift
      camera.position.x = smX * 0.5;
      camera.position.y = 2.2 - smY * 0.25;
      // Layer parallax
      sky.position.x       = -smX * 1.5;
      farLayer.position.x  = -smX * 3.0;
      midLayer.position.x  = -smX * 5.5;
      nearLayer.position.x = -smX * 8.0;
      particleLayer.position.x = -smX * 4.0;
      sky.position.y       = -smY * 0.4;
      farLayer.position.y  = -smY * 0.6;
      midLayer.position.y  = -smY * 0.8;
      nearLayer.position.y = -smY * 1.0;
      // Look target follows mouse subtly
      lookTarget.set(smX * 0.4, 2.5 - smY * 0.15, 0);
    }
    camera.lookAt(lookTarget);

    // Idle character sway
    character.rotation.y = Math.sin(t * 0.5) * 0.025;
    character.position.y = Math.sin(t * 0.8) * 0.04;
    tailL.rotation.z = 0.3  + Math.sin(t * 1.2)       * 0.08;
    tailR.rotation.z = -0.3 - Math.sin(t * 1.2 + 0.5) * 0.08;
    hairBangs.position.y = 3.55 + Math.sin(t * 1.2) * 0.012;

    // Sun pulse
    var pulseS = 1 + Math.sin(t * 0.6) * 0.04;
    halo.scale.set(80 * pulseS, 80 * pulseS, 1);

    // Particle drift
    var pos = particles.geometry.attributes.position.array;
    for (var i = 0; i < pCount; i++) {
      pos[i * 3 + 1] += pVel[i];
      pos[i * 3]     += Math.sin(t * 0.5 + i) * 0.002;
      if (pos[i * 3 + 1] > 26) {
        pos[i * 3 + 1] = 0.2;
        pos[i * 3]     = (Math.random() - 0.5) * 80;
        pos[i * 3 + 2] = (Math.random() - 0.5) * 60 - 5;
      }
    }
    particles.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();

  // ===================== Journey animation =====================
  window.startJourney = function () {
    var btn       = document.getElementById('btnStart');
    var flash     = document.getElementById('flash');
    var endScreen = document.getElementById('endScreen');
    var stageTexts = document.querySelectorAll('#stage .title, #stage .subtitle');

    // Disable button
    btn.onclick = null;
    btn.style.pointerEvents = 'none';
    btn.style.cursor = 'default';

    journeyActive = true;

    var tl = gsap.timeline();

    // 1. UI fade out (0.4s)
    tl.to(btn, { duration: 0.4, opacity: 0, scale: 0.92, ease: 'power2.in' });
    tl.to(stageTexts, {
      duration: 0.5, opacity: 0, y: -20, stagger: 0.05, ease: 'power2.in'
    }, '<');
    tl.to('.hint, .topbar, .corner', {
      duration: 0.5, opacity: 0, ease: 'power1.in'
    }, '<');

    // 2. Arm extends toward camera (0.8s)
    tl.to(rightArm.pivot.rotation, {
      duration: 0.8, x: -1.4, y: -0.2, z: 0.2, ease: 'power2.out'
    }, '-=0.1');
    tl.to(rightArm.forePivot.rotation, {
      duration: 0.8, x: -0.4, ease: 'power2.out'
    }, '<');
    tl.to(character.rotation, {
      duration: 0.8, x: 0.12, ease: 'power2.out'
    }, '<');
    // Left arm relaxes down/back
    tl.to(leftArm.pivot.rotation, {
      duration: 0.8, x: 0.0, z: 0.45, ease: 'power2.out'
    }, '<');

    // 3. "Pulled forward" camera dolly (1.6s)
    tl.to(camera.position, {
      duration: 1.6, z: 4, y: 1.9, x: 0, ease: 'power2.inOut'
    }, '-=0.1');
    tl.to(character.position, {
      duration: 1.6, z: 0, y: 0, ease: 'power2.inOut'
    }, '<');
    // Walking bounce
    tl.to(character.position, {
      duration: 0.22, y: 0.18, ease: 'power1.inOut',
      yoyo: true, repeat: 6
    }, '<');
    // Hand reaches further during dolly
    tl.to(rightArm.pivot.rotation, {
      duration: 1.6, x: -1.55, ease: 'power2.inOut'
    }, '<');
    tl.to(rightArm.forePivot.rotation, {
      duration: 1.6, x: -0.5, ease: 'power2.inOut'
    }, '<');
    // Body sway while walking
    tl.to(character.rotation, {
      duration: 0.4, z: 0.04, ease: 'power1.inOut',
      yoyo: true, repeat: 3
    }, '<');
    // Look down toward hand
    tl.to(lookTarget, {
      duration: 1.6, y: 1.7, x: 0.45, ease: 'power2.inOut'
    }, '<');
    // Fog thickens (we walk into the sunset)
    tl.to(scene.fog, {
      duration: 1.6, density: 0.024, ease: 'power1.in'
    }, '<');
    // Rim light intensifies
    tl.to(rimLight, { duration: 1.6, intensity: 1.4 }, '<');

    // 4. White flash (0.3s)
    tl.to(flash, { duration: 0.22, opacity: 1, ease: 'power2.in' });
    tl.to(flash, { duration: 0.08, opacity: 0, ease: 'none' });

    // 5. End placeholder
    tl.set(endScreen, { pointerEvents: 'auto' });
    tl.to(endScreen, { duration: 0.5, opacity: 1, ease: 'power2.out' });
    tl.from(endScreen.children, {
      duration: 0.7, y: 30, opacity: 0, stagger: 0.1, ease: 'power2.out'
    }, '<+=0.1');
  };
})();
</script>
</body>
</html>
