<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实习生成长导航 · 启程</title>
<style>
  :root {
    --ink: #1a0e1f;
    --warm-1: #fff3e0;
    --warm-2: #ffd9a8;
    --warm-3: #ff9a5a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #150820;
    font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--warm-1);
    -webkit-font-smoothing: antialiased;
    cursor: crosshair;
  }

  /* Background layers */
  .bg-scene {
    position: fixed; inset: 0; z-index: 1;
    background-image: url('file:///Users/jojo/Pictures/微信图片_20260607145834_65_2.jpg');
    background-size: cover;
    background-position: center;
    transition: transform 0.1s ease-out;
    will-change: transform;
  }
  .bg-scene::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 50% at center, transparent 40%, rgba(15,5,20,0.65) 100%);
  }

  /* Light particles overlay */
  .particles {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: #ffd9a0;
    border-radius: 50%;
    box-shadow: 0 0 6px #ff9a5a;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
  }

  /* Vignette + grain */
  .vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse 80% 60% at center, transparent 20%, rgba(12,4,16,0.8) 100%);
  }
  .grain {
    position: fixed; inset: 0; z-index: 4; pointer-events: none;
    opacity: 0.04;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.6) 1px, transparent 0);
    background-size: 3px 3px;
  }

  /* Corner brackets */
  .corner {
    position: fixed; z-index: 8; width: 18px; height: 18px;
    border-color: var(--warm-3); opacity: 0.5;
    animation: fadeUp 1.5s ease 0.6s both;
  }
  .corner.tl { top: 24px; left: 24px;  border-top: 1px solid; border-left: 1px solid; }
  .corner.tr { top: 24px; right: 24px; border-top: 1px solid; border-right: 1px solid; }
  .corner.bl { bottom: 24px; left: 24px;  border-bottom: 1px solid; border-left: 1px solid; }
  .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid; border-right: 1px solid; }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 8;
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(10,5,15,0.7) 0%, transparent 100%);
    animation: fadeDown 1.2s ease 0.4s both;
  }
  .topbar .brand { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; }
  .topbar .chapter { font-size: 10px; opacity: 0.5; letter-spacing: 0.2em; }

  /* Center stage */
  .stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .title {
    font-size: 52px; font-weight: 200; letter-spacing: 0.35em;
    text-indent: 0.35em;
    animation: fadeUp 1.6s ease 0.8s both;
    text-shadow: 0 0 80px rgba(255,140,60,0.4);
  }
  .subtitle {
    margin-top: 12px;
    font-size: 11px; letter-spacing: 0.5em; text-indent: 0.5em;
    opacity: 0; color: var(--warm-2);
    animation: fadeUp 1.6s ease 1.2s both;
  }
  .btn-start {
    margin-top: 48px;
    padding: 14px 56px;
    border: 1px solid rgba(255,180,120,0.3);
    background: rgba(20,5,15,0.6);
    backdrop-filter: blur(8px);
    color: var(--warm-1);
    font-size: 15px; font-weight: 300; letter-spacing: 0.3em;
    cursor: pointer; pointer-events: auto;
    font-family: inherit;
    border-radius: 2px;
    animation: fadeUp 1.6s ease 1.6s both,
               breathing 3s ease-in-out 2s infinite;
    transition: all 0.3s;
  }
  .btn-start:hover {
    background: rgba(255,140,60,0.15);
    border-color: rgba(255,160,100,0.6);
    box-shadow: 0 0 40px rgba(255,120,60,0.25);
  }
  @keyframes breathing {
    0%, 100% { box-shadow: 0 0 20px rgba(255,120,60,0.15), inset 0 0 8px rgba(255,160,100,0.08); }
    50%      { box-shadow: 0 0 50px rgba(255,120,60,0.35), inset 0 0 18px rgba(255,160,100,0.18); }
  }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

  .hint {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 8;
    font-size: 10px; letter-spacing: 0.25em;
    opacity: 0; color: rgba(255,200,160,0.5);
    animation: fadeUp 1.6s ease 2s both;
  }

  /* Flash */
  .flash {
    position: fixed; inset: 0; z-index: 50;
    background: white; opacity: 0; pointer-events: none;
  }

  /* End screen */
  .end {
    position: fixed; inset: 0; z-index: 40;
    background: linear-gradient(180deg, #f7f1e6 0%, #ead9bf 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .end-mark { width: 48px; height: 1px; background: #8a5a30; margin-bottom: 32px; opacity: 0.4; }
  .end h1 { color: #1a0e1f; font-size: 32px; font-weight: 300; letter-spacing: 0.5em; text-indent: 0.5em; }
  .end .end-sub { color: #6a4a30; margin-top: 18px; font-size: 11px; letter-spacing: 0.4em; opacity: 0.6; }
</style>
</head>
<body>

<div class="bg-scene" id="bgScene"></div>

<div id="particlesContainer" class="particles"></div>
<div class="vignette"></div>
<div class="grain"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="topbar">
  <span class="brand">实习生成长导航</span>
  <span class="chapter">CHAPTER 00 · 启程</span>
</div>

<div class="stage" id="stage">
  <h1 class="title">启 程</h1>
  <div class="subtitle">A JOURNEY OF GROWTH</div>
  <button class="btn-start" id="btnStart" onclick="startJourney()">开始旅途</button>
</div>

<div class="hint">移动鼠标 · 体验视差</div>

<div class="flash" id="flash"></div>

<div class="end" id="endScreen">
  <div class="end-mark"></div>
  <h1>进入角色选择</h1>
  <p class="end-sub">CHARACTER SELECT</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
(function () {
  'use strict';

  // Particles
  var pc = document.getElementById('particlesContainer');
  for (var i = 0; i < 40; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '0';
    p.style.animationDuration = (6 + Math.random() * 12) + 's';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.width = (1 + Math.random() * 2) + 'px';
    p.style.height = p.style.width;
    pc.appendChild(p);
  }

  // Mouse parallax
  var bg = document.getElementById('bgScene');
  var mouseX = 0, mouseY = 0;
  var smX = 0, smY = 0;

  window.onmousemove = function (e) {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  };

  function animate() {
    smX += (mouseX - smX) * 0.04;
    smY += (mouseY - smY) * 0.04;
    bg.style.transform = 'translate(' + (smX * 15) + 'px, ' + (smY * 10) + 'px) scale(1.08)';
    requestAnimationFrame(animate);
  }
  animate();

  // Journey animation
  window.startJourney = function () {
    var btn = document.getElementById('btnStart');
    var flash = document.getElementById('flash');
    var endScreen = document.getElementById('endScreen');
    var stageEls = document.querySelectorAll('#stage .title, #stage .subtitle');

    btn.onclick = null;
    btn.style.pointerEvents = 'none';

    var tl = gsap.timeline();

    // UI fade out
    tl.to(btn, { duration: 0.4, opacity: 0, scale: 0.9, ease: 'power2.in' });
    tl.to(stageEls, { duration: 0.5, opacity: 0, y: -30, stagger: 0.08, ease: 'power2.in' }, '<');
    tl.to('.hint, .topbar, .corner', { duration: 0.5, opacity: 0, ease: 'power1.in' }, '<');

    // Camera zoom into the image
    tl.to(bg, { duration: 1.8, scale: 1.35, ease: 'power2.inOut' }, '-=0.1');
    tl.to('.vignette', { duration: 1.8, opacity: 0.6, ease: 'power1.in' }, '<');
    tl.to(bg, { duration: 0.3, filter: 'brightness(2.5) blur(2px)', ease: 'power2.in' }, '+=0.2');

    // White flash
    tl.to(flash, { duration: 0.3, opacity: 1, ease: 'power2.in' });
    tl.to(flash, { duration: 0.15, opacity: 0, ease: 'none' });

    // End screen
    tl.set(endScreen, { pointerEvents: 'auto' });
    tl.to(endScreen, { duration: 0.6, opacity: 1, ease: 'power2.out' });
    tl.from(endScreen.children, { duration: 0.8, y: 40, opacity: 0, stagger: 0.12, ease: 'power2.out' }, '<+=0.15');
  };
})();
</script>
</body>
</html>
